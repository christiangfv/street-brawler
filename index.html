<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Street Brawler</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Portrait warning overlay -->
  <div id="portrait-warning">
    <div class="pw-inner">
      <div class="pw-icon">📱</div>
      <div class="pw-text">Rotate your device<br>for the best experience</div>
    </div>
  </div>

  <!-- Fullscreen button -->
  <button id="btn-fullscreen" title="Fullscreen">⛶</button>

  <!-- Canvas fills entire viewport -->
  <canvas id="gameCanvas"></canvas>

  <!-- Mobile arcade controls -->
  <div id="mobile-controls">
    <!-- P1 left side -->
    <div class="player-controls" id="p1-controls">
      <div class="player-label p1-label">P1</div>
      <div class="controls-row">
        <div class="dpad">
          <button class="dpad-btn" id="p1-left">◀</button>
          <button class="dpad-btn" id="p1-right">▶</button>
        </div>
        <button class="attack-btn p1-atk" id="p1-attack">ATK</button>
      </div>
    </div>

    <!-- Center: restart -->
    <div id="center-controls">
      <button id="btn-restart" title="Restart">↺</button>
    </div>

    <!-- P2 right side -->
    <div class="player-controls" id="p2-controls">
      <div class="player-label p2-label">P2</div>
      <div class="controls-row">
        <button class="attack-btn p2-atk" id="p2-attack">ATK</button>
        <div class="dpad">
          <button class="dpad-btn" id="p2-left">◀</button>
          <button class="dpad-btn" id="p2-right">▶</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
